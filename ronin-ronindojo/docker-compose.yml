version: "3.7"

services:
  # ==========================================================
  # APP_PROXY — Reverse proxy Umbrel (obligatoire)
  # Gère l'authentification (mot de passe Umbrel) et le HTTPS
  # Redirige le trafic vers nginx (le frontend de Dojo)
  # ==========================================================
  app_proxy:
    environment:
      APP_HOST: ronin-ronindojo-ronin-ui-1
      APP_PORT: 3000

  # ==========================================================
  # DATABASE — MariaDB pour stocker les données indexées par Dojo
  # (transactions, adresses suivies, etc.)
  # ==========================================================
  db:
    image: ghcr.io/skyman21m/dojo-db:1.7.0
    restart: on-failure
    hostname: db
    stop_grace_period: 1m
    environment:
      MYSQL_ROOT_PASSWORD: ${APP_PASSWORD}
      MYSQL_DATABASE: samourai-main
      MYSQL_USER: samourai
      MYSQL_PASSWORD: ${APP_PASSWORD}
    volumes:
      - ${APP_DATA_DIR}/data/mysql:/var/lib/mysql

  # ==========================================================
  # TOR — Services cachés .onion pour Dojo
  # Permet la connexion privée via Tor
  # NET_DOJO_TOR_IPV4=0.0.0.0 pour binder sur toutes les interfaces
  # Les NET_*_IPV4 pour les autres services = noms Docker (routage)
  # ==========================================================
  tor:
    image: ghcr.io/skyman21m/dojo-tor:1.23.0
    restart: on-failure
    user: "1000:1000"
    hostname: tor
    command: "/restart.sh"
    environment:
      COMMON_BTC_NETWORK: mainnet
      TOR_SOCKS_PORT: "9050"
      TOR_USE_BRIDGES: "off"
      TOR_BRIDGE_TYPE: obfs4
      TOR_BRIDGE_1: ""
      TOR_BRIDGE_2: ""
      TOR_BRIDGE_3: ""
      BITCOIND_INSTALL: "off"
      BITCOIND_IP: ${APP_BITCOIN_NODE_IP}
      BITCOIND_RPC_PORT: ${APP_BITCOIN_RPC_PORT}
      INDEXER_INSTALL: "on"
      INDEXER_TYPE: electrs
      INDEXER_IP: electrs
      INDEXER_RPC_PORT: "50001"
      EXPLORER_INSTALL: "on"
      SOROBAN_INSTALL: "on"
      SOROBAN_PORT: "4242"
      MEMPOOL_INSTALL: "on"
      NET_MEMPOOL_WEB_IPV4: mempool_web
      # Binding : Tor écoute sur toutes les interfaces de son container
      NET_DOJO_TOR_IPV4: "0.0.0.0"
      # Routage : pointe vers les autres containers par nom Docker
      NET_DOJO_NODE_IPV4: node
      NET_DOJO_NGINX_IPV4: nginx
      NET_DOJO_INDEXER_IPV4: electrs
      NET_DOJO_EXPLORER_IPV4: explorer
      NET_DOJO_SOROBAN_IPV4: soroban
      NET_DMZ_NGINX_IPV4: nginx
    volumes:
      - ${APP_DATA_DIR}/data/tor:/var/lib/tor
      - ${APP_DATA_DIR}/tor-restart.sh:/restart.sh:ro

  # ==========================================================
  # NODE — Cœur de Dojo (Node.js)
  # API backend pour Samourai Wallet, tracker de transactions,
  # outil de maintenance (admin web)
  # Se connecte au Bitcoin Node d'Umbrel via RPC
  # ==========================================================
  node:
    image: ghcr.io/skyman21m/dojo-nodejs:1.28.2
    restart: on-failure
    user: "1000:1000"
    hostname: node
    depends_on:
      - db
    command: "/home/node/app/wait-for-it.sh db:3306 --timeout=720 --strict -- /home/node/app/restart.sh"
    environment:
      COMMON_BTC_NETWORK: mainnet
      DOJO_VERSION_TAG: "1.28.2"
      # MySQL
      MYSQL_DATABASE: samourai-main
      MYSQL_USER: samourai
      MYSQL_PASSWORD: ${APP_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${APP_PASSWORD}
      # Bitcoin RPC — connecté au nœud Umbrel
      BITCOIND_INSTALL: "off"
      BITCOIND_IP: ${APP_BITCOIN_NODE_IP}
      BITCOIND_RPC_PORT: ${APP_BITCOIN_RPC_PORT}
      BITCOIND_RPC_USER: ${APP_BITCOIN_RPC_USER}
      BITCOIND_RPC_PASSWORD: ${APP_BITCOIN_RPC_PASS}
      BITCOIND_ZMQ_RAWTXS: ${APP_BITCOIN_ZMQ_RAWTX_PORT}
      BITCOIND_ZMQ_BLK_HASH: ${APP_BITCOIN_ZMQ_HASHBLOCK_PORT}
      # Dojo API keys
      NODE_API_KEY: ${APP_SEED}
      NODE_ADMIN_KEY: ${APP_SEED}
      NODE_JWT_SECRET: ${APP_SEED}_jwt
      NODE_ACTIVE_INDEXER: local_indexer
      NODE_FEE_TYPE: ECONOMICAL
      NODE_GAP_EXTERNAL: "100"
      NODE_GAP_INTERNAL: "100"
      NODE_ADDR_FILTER_THRESHOLD: "1000"
      NODE_ADDR_DERIVATION_MIN_CHILD: "2"
      NODE_ADDR_DERIVATION_MAX_CHILD: "2"
      NODE_ADDR_DERIVATION_THRESHOLD: "10"
      NODE_TXS_SCHED_MAX_ENTRIES: "10"
      NODE_TXS_SCHED_MAX_DELTA_HEIGHT: "18"
      NODE_JWT_ACCESS_EXPIRES: "900"
      NODE_JWT_REFRESH_EXPIRES: "7200"
      NODE_PREFIX_STATUS: status
      NODE_PREFIX_SUPPORT: support
      NODE_PREFIX_STATUS_PUSHTX: status
      NODE_TRACKER_MEMPOOL_PERIOD: "10000"
      NODE_TRACKER_UNCONF_TXS_PERIOD: "300000"
      # PandoTx
      NODE_PANDOTX_PUSH: "on"
      NODE_PANDOTX_PROCESS: "on"
      NODE_PANDOTX_FALLBACK_MODE: convenient
      NODE_PANDOTX_NB_RETRIES: "2"
      NODE_PANDOTX_PUSH_KEY_MAIN: "pandotx.mainnet.push"
      NODE_PANDOTX_PUSH_KEY_TEST: "pandotx.testnet.push"
      NODE_PANDOTX_RESULTS_KEY_MAIN: "pandotx.mainnet.results"
      NODE_PANDOTX_RESULTS_KEY_TEST: "pandotx.testnet.results"
      # Indexer
      INDEXER_INSTALL: "on"
      INDEXER_TYPE: electrs
      INDEXER_IP: electrs
      INDEXER_RPC_PORT: "50001"
      INDEXER_BATCH_SUPPORT: inactive
      INDEXER_PROTOCOL: tcp
      # Explorer
      EXPLORER_INSTALL: "on"
      # Soroban
      SOROBAN_INSTALL: "on"
      SOROBAN_PORT: "4242"
      SOROBAN_ANNOUNCE: "on"
      SOROBAN_ANNOUNCE_KEY_MAIN: "soroban.cluster.mainnet.nodes"
      SOROBAN_ANNOUNCE_KEY_TEST: "soroban.cluster.testnet.nodes"
      # Réseau interne (routage vers les autres containers)
      TOR_SOCKS_PORT: "9050"
      NET_DOJO_TOR_IPV4: tor
      NET_DOJO_MYSQL_IPV4: db
      NET_DOJO_INDEXER_IPV4: electrs
      NET_DOJO_SOROBAN_IPV4: soroban
    volumes:
      - ${APP_DATA_DIR}/data/tor:/var/lib/tor

  # ==========================================================
  # NGINX — Reverse proxy Dojo → interface admin + pairing wallet
  # app_proxy d'Umbrel redirige vers ce service sur le port 80
  # ==========================================================
  nginx:
    image: ghcr.io/skyman21m/dojo-nginx:1.9.0
    restart: on-failure
    hostname: nginx
    depends_on:
      - node
    command: "/wait-for node:8080 --timeout=720 -- nginx"
    environment:
      COMMON_BTC_NETWORK: mainnet
      EXPLORER_INSTALL: "on"

  # ==========================================================
  # ELECTRS — Serveur Electrum léger
  # Indexe les adresses/transactions de la blockchain
  # Première indexation : plusieurs heures
  # ==========================================================
  electrs:
    image: ghcr.io/skyman21m/dojo-electrs:1.2.0
    restart: on-failure
    user: "1000:1000"
    stop_grace_period: 1m
    hostname: electrs
    command: "/restart.sh"
    depends_on:
      - tor
    environment:
      COMMON_BTC_NETWORK: mainnet
      BITCOIND_IP: ${APP_BITCOIN_NODE_IP}
      BITCOIND_RPC_PORT: ${APP_BITCOIN_RPC_PORT}
      BITCOIND_RPC_USER: ${APP_BITCOIN_RPC_USER}
      BITCOIND_RPC_PASSWORD: ${APP_BITCOIN_RPC_PASS}
      BITCOIND_P2P_PORT: ${APP_BITCOIN_P2P_PORT}
      # Binding : electrs écoute sur toutes les interfaces
      NET_DOJO_INDEXER_IPV4: "0.0.0.0"
      INDEXER_IP: "0.0.0.0"
      INDEXER_RPC_PORT: "50001"
      INDEXER_BATCH_SIZE: "10"
      INDEXER_BLK_TXIDS_CACHE_SIZE_MB: "10"
      INDEXER_TXID_LIMIT: "501"
      # Routage vers Tor
      NET_DOJO_TOR_IPV4: tor
      TOR_SOCKS_PORT: "9050"
    volumes:
      - ${APP_DATA_DIR}/data/electrs:/home/electrs

  # ==========================================================
  # EXPLORER — Explorateur de blocs (btc-rpc-explorer)
  # ==========================================================
  explorer:
    image: ghcr.io/skyman21m/dojo-explorer:3.5.1
    restart: on-failure
    hostname: explorer
    command: "/home/node/app/restart.sh"
    environment:
      COMMON_BTC_NETWORK: mainnet
      BITCOIND_IP: ${APP_BITCOIN_NODE_IP}
      BITCOIND_RPC_PORT: ${APP_BITCOIN_RPC_PORT}
      BITCOIND_RPC_USER: ${APP_BITCOIN_RPC_USER}
      BITCOIND_RPC_PASSWORD: ${APP_BITCOIN_RPC_PASS}
      EXPLORER_SLOW_DEVICE_MODE: "on"
      NODE_ACTIVE_INDEXER: local_indexer
      INDEXER_IP: electrs
      INDEXER_RPC_PORT: "50001"
      INDEXER_PROTOCOL: tcp
      # Binding : explorer écoute sur toutes les interfaces
      NET_DOJO_EXPLORER_IPV4: "0.0.0.0"

  # ==========================================================
  # SOROBAN — Réseau décentralisé PandoTx
  # Broadcast de transactions P2P pour CoinJoin Whirlpool
  # ==========================================================
  soroban:
    image: ghcr.io/skyman21m/dojo-soroban:0.4.2
    restart: on-failure
    user: "1000:1000"
    hostname: soroban
    stop_grace_period: 1m
    environment:
      COMMON_BTC_NETWORK: mainnet
      SOROBAN_INSTALL: "on"
      SOROBAN_ANNOUNCE: "on"
      SOROBAN_LOG_LEVEL: info
      SOROBAN_PORT: "4242"
      SOROBAN_ONION_FILE: /home/soroban/data/hostname
      SOROBAN_DHT_SERVER_MODE: "on"
      SOROBAN_DOMAIN_MAIN: soroban
      SOROBAN_DOMAIN_TEST: soroban-test
      SOROBAN_ANNOUNCE_KEY_MAIN: "soroban.cluster.mainnet.nodes"
      SOROBAN_ANNOUNCE_KEY_TEST: "soroban.cluster.testnet.nodes"
      SOROBAN_P2P_LISTEN_PORT: "1042"
      SOROBAN_P2P_ROOM_MAIN: soroban-dojo
      SOROBAN_P2P_ROOM_TEST: soroban-dojo-test
      SOROBAN_P2P_LOWWATER: "16"
      SOROBAN_P2P_HIGHWATER: "40"
      SOROBAN_P2P_PEERSTORE_FILE: /home/soroban/data/peerstore
      SOROBAN_GOSSIP_D: "10"
      SOROBAN_GOSSIP_DLO: "8"
      SOROBAN_GOSSIP_DHI: "20"
      SOROBAN_GOSSIP_DOUT: "5"
      SOROBAN_GOSSIP_DSCORE: "7"
      SOROBAN_GOSSIP_DLAZY: "10"
      SOROBAN_GOSSIP_PRUNE_PEERS: "40"
      SOROBAN_GOSSIP_LIMIT: "40"
      SOROBAN_IPC_CHILD_COUNT: "2"
      SOROBAN_IPC_NATS_PORT: "4322"
      SOROBAN_P2P_BOOTSTRAP_MAIN: "/onion3/mainq7mcl4v74chajbkum2lbwt57v6nrh7xob36yzft3wumc4c6bweyd:8043/p2p/16Uiu2HAmMuSBrBZUhA5crgPZ177WcrHRayyWy9KEuMBC1eU2Haik,/onion3/mainuz2njlb2xzyv2toazln6dn5uxwne6f5pqyhspj64mwov4ol5iiyd:8043/p2p/16Uiu2HAm4aVNSPB9FAchDEyVD3EmiXmND8Q72Lw37JWSqYSLxwUN,/onion3/mainghjzdkk27k2qaszorxubtj6v5cjx2epq2eibso3bqccttxvqcuqd:8055/p2p/16Uiu2HAm722GWWwkXMWvMHMY4iWgBxxbk3jNEKYyx5k956W8bern,/onion3/maingcdb5iqmzloaamj47nlpoylvq2pwd243xthbatfgeanchys5tuyd:8055/p2p/16Uiu2HAm1pZHHrNXUrV3buwwRGB5hS2v4dBV2PkB6C6T3EkgkCfH,/onion3/mainjqnhx5fdlnybynjz4tlf7bhqsu4lh6g7nxfwdktq5exvgw4iryad:8043/p2p/16Uiu2HAm4zAwRPKRTsiz8jUzXyUcG5d6VU9cQi4BWo4oq8HxV1yg"
      SOROBAN_P2P_BOOTSTRAP_TEST: "/onion3/sorisiuznu6pq6bu3mi5wju3tbgqvxukjcwq43zoiywdqspea2bjjtid:8043/p2p/16Uiu2HAmQTYgs7ec8tdXmLBhoVeFcmQTdGCso95cqLGKMt3B4qCL,/onion3/sor6dlytdec7povaomplfylbgmxwfvk3nezejsme57iymqgfpm3eloid:8045/p2p/16Uiu2HAkvsdHAUzhEP7nhrD8oB3BnAKqEyku7RFCbX1whhoBwoNn,/onion3/sorqyjhyngcninys3yqdr6lth22wmdcs6bsu7k2fbgkajcixcmadfayd:8047/p2p/16Uiu2HAm1FiuZhRn23RsSTzkDbM1KXwthWxuKoUyuuEmbGrCpVxf,/onion3/testuolntc6khi6he35ladivnd3k2qhluu62vgik5v74zxcvb2niskad:8043/p2p/16Uiu2HAmGDhC3ziYzsUUDMXbQ3VTZz3FBbRfoXXVi9A2FnSYYT3R,/onion3/testrxrg5lfkfsdvlmibat752t7ufanvitbv3hz5mjvpw5owlrxfabid:8043/p2p/16Uiu2HAmR5iYTB9vU5C1CqirZ2ty1aKuzHm4z6QAwgjtVP5nVLFJ"
      NET_DOJO_SOROBAN_IPV4: soroban
    volumes:
      - ${APP_DATA_DIR}/data/soroban:/home/soroban/data

  # ==========================================================
  # MEMPOOL SPACE — Visualiseur de mempool Bitcoin
  # 3 services : base de données, API backend, frontend web
  # ==========================================================
  mempool_db:
    image: mariadb:10.5.8
    restart: on-failure
    hostname: mempool_db
    stop_grace_period: 1m
    environment:
      MYSQL_DATABASE: mempool
      MYSQL_USER: mempool
      MYSQL_PASSWORD: mempool
      MYSQL_ROOT_PASSWORD: mempooladmin
    volumes:
      - ${APP_DATA_DIR}/data/mempool-db:/var/lib/mysql

  mempool_api:
    image: mempool/backend:v2.4.0
    restart: on-failure
    hostname: mempool_api
    stop_grace_period: 1m
    user: "1000:1000"
    command: "./wait-for-it.sh mempool_db:3306 --timeout=720 --strict -- ./start.sh"
    depends_on:
      - mempool_db
    environment:
      MEMPOOL_BACKEND: "electrum"
      CORE_RPC_HOST: ${APP_BITCOIN_NODE_IP}
      CORE_RPC_PORT: ${APP_BITCOIN_RPC_PORT}
      CORE_RPC_USERNAME: ${APP_BITCOIN_RPC_USER}
      CORE_RPC_PASSWORD: ${APP_BITCOIN_RPC_PASS}
      ELECTRUM_HOST: electrs
      ELECTRUM_PORT: "50001"
      ELECTRUM_TLS: "false"
      DATABASE_ENABLED: "true"
      DATABASE_HOST: mempool_db
      DATABASE_PORT: "3306"
      DATABASE_DATABASE: mempool
      DATABASE_USERNAME: mempool
      DATABASE_PASSWORD: mempool
      MEMPOOL_HTTP_PORT: "8999"
      MEMPOOL_CACHE_DIR: "/backend/cache"
      MEMPOOL_CLEAR_PROTECTION_MINUTES: "20"
    volumes:
      - ${APP_DATA_DIR}/data/mempool-api:/backend/cache

  mempool_web:
    image: mempool/frontend:v2.4.0
    restart: on-failure
    hostname: mempool_web
    stop_grace_period: 1m
    user: "1000:1000"
    command: "./wait-for mempool_db:3306 --timeout=720 -- nginx -g 'daemon off;'"
    depends_on:
      - mempool_db
    environment:
      FRONTEND_HTTP_PORT: "8080"
      BACKEND_MAINNET_HTTP_HOST: mempool_api

  # ==========================================================
  # RONIN-UI — Dashboard Next.js
  # Interface graphique complète pour gérer Dojo
  # Remplace le Maintenance Tool basique
  # ==========================================================
  ronin-ui:
    image: ghcr.io/skyman21m/ronin-ui:2.6.0
    restart: on-failure
    user: "0:0"
    hostname: ronin-ui
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    depends_on:
      - node
      - tor
    environment:
      NODE_ENV: production
      JWT_SECRET: ${APP_SEED}_roninui_jwt_secret_pad
      COOKIE_MAX_AGE: "7200"
      NEXT_TELEMETRY_DISABLED: "1"
      USE_REAL_DATA: "true"
      RONIN_UI_USERNAME: umbrel
      RONIN_UI_DATA_DIR: /app/data
      # Dojo API
      DOJO_API_URL: http://node:8080/
      NODE_API_KEY: ${APP_SEED}
      NODE_ADMIN_KEY: ${APP_SEED}
      DOJO_VERSION_TAG: "1.28.2"
      # Bitcoin RPC
      BITCOIND_RPC_HOST: ${APP_BITCOIN_NODE_IP}
      BITCOIND_RPC_PORT: ${APP_BITCOIN_RPC_PORT}
      BITCOIND_RPC_USER: ${APP_BITCOIN_RPC_USER}
      BITCOIND_RPC_PASSWORD: ${APP_BITCOIN_RPC_PASS}
      # Docker container names for exec
      DOCKER_TOR_CONTAINER: ronin-ronindojo-tor-1
      # Default login password (from Umbrel, shown in "Default credentials")
      APP_PASSWORD: ${APP_PASSWORD}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${APP_DATA_DIR}/data/ronin-ui:/app/data
